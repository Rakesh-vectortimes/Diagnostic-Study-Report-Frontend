<div [formGroup]="formGroup()" class="section-form">
  <mat-form-field appearance="outline">
    <mat-label>Select Company</mat-label>
    <mat-select
      formControlName="company_id"
      [compareWith]="compareCompanyId"
      (selectionChange)="onCompanyChange($event.value)"
    >
      @for (c of companies; track companyOptionValue(c)) {
        <mat-option [value]="companyOptionValue(c)">{{ c.company_name }}</mat-option>
      }
    </mat-select>
  </mat-form-field>
  <app-rich-text-editor
    class="full-width"
    label="Company Introduction"
    formControlName="company_introduction"
  ></app-rich-text-editor>
  <mat-form-field appearance="outline">
    <mat-label>Location</mat-label>
    <input matInput formControlName="location" />
  </mat-form-field>
  <mat-form-field appearance="outline">
    <mat-label>Total Workforce</mat-label>
    <input matInput type="number" formControlName="total_workforce" />
  </mat-form-field>
  <mat-form-field appearance="outline">
    <mat-label>Shift Operation</mat-label>
    <input matInput formControlName="shift_operation" />
  </mat-form-field>
  <mat-form-field appearance="outline">
    <mat-label>Working Hours</mat-label>
    <input matInput formControlName="working_hours" />
  </mat-form-field>
  <mat-form-field appearance="outline">
    <mat-label>Working Days</mat-label>
    <input matInput formControlName="working_days" />
  </mat-form-field>
</div>
